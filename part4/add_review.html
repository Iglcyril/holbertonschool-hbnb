<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <div class="header-container">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html" class="login-button" id="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="add-review">
            <h1>Add a Review</h1>
            <p id="place-title"></p>
            <form id="review-form" class="form">
                <div class="form-group">
                    <label for="review-text">Your review</label>
                    <textarea id="review-text" name="review-text" rows="5" placeholder="Share your experience..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="1">⭐ 1 - Poor</option>
                        <option value="2">⭐⭐ 2 - Fair</option>
                        <option value="3">⭐⭐⭐ 3 - Good</option>
                        <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
                        <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
                    </select>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="details-button">Submit Review</button>
                    <a href="index.html" class="cancel-button">Cancel</a>
                </div>
                <p id="success-message" class="success-message"></p>
                <p id="error-message" class="error-message"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts/scripts.js"></script>
    <script src="scripts/add_review.js"></script>
</body>
</html>
