<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Home</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <div class="header-container">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html" class="login-button" id="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="filters">
            <h1>Find your perfect place</h1>
            <div class="filter-group">
                <label for="price-filter">Max price per night :</label>
                <select id="price-filter">
                    <option value="all">All</option>
                    <option value="10">$10</option>
                    <option value="50">$50</option>
                    <option value="100">$100</option>
                </select>
            </div>
        </section>
        <section id="places-list" class="places-list">
            <!-- Places will be dynamically inserted here -->
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts/scripts.js"></script>
    <script src="scripts/index.js"></script>
</body>
</html>
