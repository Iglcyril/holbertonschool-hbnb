<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Home</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <div class="header-container">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html" class="login-button" id="login-link">Login</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <h1 class="hero-title">Where every journey<br>finds its home</h1>
        <p class="hero-subtitle">Discover unique places to stay around the world</p>
        <div class="hero-search">
            <select id="price-filter">
                <option value="all">All prices</option>
                <option value="10">Max $10 / night</option>
                <option value="50">Max $50 / night</option>
                <option value="100">Max $100 / night</option>
            </select>
            <button class="search-btn">Search</button>
        </div>
    </section>

    <section class="stats-section">
        <div class="stat-item">
            <span class="stat-number">500+</span>
            <span class="stat-label">Unique Places</span>
        </div>
        <div class="stat-item">
            <span class="stat-number">50+</span>
            <span class="stat-label">Cities</span>
        </div>
        <div class="stat-item">
            <span class="stat-number">2000+</span>
            <span class="stat-label">Happy Guests</span>
        </div>
        <div class="stat-item">
            <span class="stat-number">4.9⭐</span>
            <span class="stat-label">Average Rating</span>
        </div>
    </section>

    <main class="main-container">
        <section class="filters">
        </section>
        <section id="places-list" class="places-list">
            <!-- Places will be dynamically inserted here -->
        </section>
    </main>

    <footer>
        <img src="images/logo.png" alt="HBnB Logo" class="footer-logo">
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts/scripts.js"></script>
    <script src="scripts/index.js"></script>
</body>
</html>
