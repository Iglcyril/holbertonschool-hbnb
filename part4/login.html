<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Login</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <div class="header-container">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html" class="login-button" id="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="login-container">
        <section class="login-box">
            <img src="images/logo.png" alt="HBnB Logo" class="login-logo">
            <h1>Welcome Back</h1>
            <p>Sign in to your HBnB account</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-button">Sign In</button>
                <p id="error-message" class="error-message"></p>
            </form>
        </section>
    </main>

    <footer>
        <img src="images/logo.png" alt="HBnB Logo" class="footer-logo">
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts/scripts.js"></script>
</body>
</html>
