<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header>
        <div class="header-container">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="account.html" class="login-button" id="account-link" style="display:none;">Account</a>
                <a href="login.html" class="login-button" id="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="place-main">
        <!-- Hero image -->
        <div class="place-hero">
            <div class="place-hero-image">
                <span class="place-hero-icon">🏠</span>
            </div>
        </div>

        <!-- Content -->
        <div class="place-container">
            <!-- Left column -->
            <div class="place-left">
                <div id="place-details" class="place-details"></div>
                <section id="reviews" class="reviews-section">
                    <h2 class="reviews-title">Reviews</h2>
                    <div id="reviews-list"></div>
                </section>
                <section id="add-review" class="add-review" style="display:none;">
                    <h2>Share your experience</h2>
                    <form id="review-form" class="form">
                        <div class="form-group">
                            <label for="review-text">Your review</label>
                            <textarea id="review-text" rows="4" placeholder="Share your experience..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="rating">Rating</label>
                            <select id="rating" required>
                                <option value="">-- Select a rating --</option>
                                <option value="1">⭐ 1 - Poor</option>
                                <option value="2">⭐⭐ 2 - Fair</option>
                                <option value="3">⭐⭐⭐ 3 - Good</option>
                                <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
                                <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
                            </select>
                        </div>
                        <button type="submit" class="details-button">Submit Review</button>
                        <p id="review-success" class="success-message"></p>
                        <p id="review-error" class="error-message"></p>
                    </form>
                </section>
            </div>

            <!-- Right column -->
            <div class="place-right">
                <div class="place-right-main">
                    <div class="price-card">
                        <div id="price-display"></div>
                        <div class="booking-form">
                            <div class="booking-dates">
                                <div class="booking-field">
                                    <label for="checkin">Check-in</label>
                                    <input type="date" id="checkin">
                                </div>
                                <div class="booking-field">
                                    <label for="checkout">Check-out</label>
                                    <input type="date" id="checkout">
                                </div>
                            </div>
                            <div id="booking-total" class="booking-total" style="display:none;">
                                <span id="nights-count"></span>
                                <span id="total-price"></span>
                            </div>
                            <button id="book-btn" class="details-button booking-btn" style="display:none;">Reserve</button>
                        </div>
                        <a href="index.html" class="back-btn">← Back to listings</a>
                    </div>
                    <div id="map" class="place-map"></div>
                </div>
                <div class="host-cards-column">
                    <div id="host-card" class="host-card" style="display:none;">
                        <h3 class="host-card-title">Your Host</h3>
                        <div class="host-card-profile">
                            <div class="host-avatar" id="host-avatar"></div>
                            <div>
                                <p class="host-name" id="host-name"></p>
                            </div>
                        </div>
                    </div>
                    <div id="host-bio-card" class="host-card" style="display:none;">
                        <h3 class="host-card-title">About the Host</h3>
                        <p class="host-bio" id="host-bio"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <img src="images/logo.png" alt="HBnB Logo" class="footer-logo">
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <div id="booking-modal" class="booking-modal">
        <div class="booking-modal-box">
            <img src="images/logo.png" alt="HBnB Logo" class="booking-modal-logo">
            <h2>Booking Confirmed!</h2>
            <p>Thank you for your booking! You will receive a payment link at your email address.</p>
            <button id="booking-modal-close" class="details-button">Close</button>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">✕</span>
        <img id="lightbox-img" src="#" alt="Place image">
    </div>

    <script src="scripts/scripts.js"></script>
    <script src="scripts/place.js"></script>
</body>
</html>
