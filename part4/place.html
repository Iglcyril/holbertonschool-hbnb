<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <div class="header-container">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html" class="login-button" id="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section id="place-details" class="place-details">
            <!-- Place details will be dynamically inserted here -->
        </section>
        <section id="reviews" class="reviews-section">
            <h2>Reviews</h2>
            <div id="reviews-list">
                <!-- Reviews will be dynamically inserted here -->
            </div>
        </section>
        <section id="add-review" class="add-review" style="display:none;">
            <h2>Add a Review</h2>
            <form id="review-form" class="form">
                <div class="form-group">
                    <label for="review-text">Your review</label>
                    <textarea id="review-text" name="review-text" rows="4" placeholder="Share your experience..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="1">⭐ 1</option>
                        <option value="2">⭐⭐ 2</option>
                        <option value="3">⭐⭐⭐ 3</option>
                        <option value="4">⭐⭐⭐⭐ 4</option>
                        <option value="5">⭐⭐⭐⭐⭐ 5</option>
                    </select>
                </div>
                <button type="submit" class="details-button">Submit Review</button>
                <p id="review-success" class="success-message"></p>
                <p id="review-error" class="error-message"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts/scripts.js"></script>
    <script src="scripts/place.js"></script>
</body>
</html>
